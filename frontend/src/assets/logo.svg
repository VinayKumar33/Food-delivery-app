<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Brand gradients -->
    <linearGradient id="heavenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E23744" />
      <stop offset="100%" stop-color="#801018" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFDF00" />
      <stop offset="100%" stop-color="#F3E5AB" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Base Circle -->
  <circle cx="250" cy="250" r="230" fill="url(#heavenGradient)" filter="url(#shadow)" />

  <!-- Inner Gold Ring -->
  <circle cx="250" cy="250" r="215" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-dasharray="10 6" opacity="0.6" />

  <!-- Cloud/Heaven base -->
  <path d="M 160 300 
           A 35 35 0 0 1 200 250 
           A 45 45 0 0 1 290 240 
           A 35 35 0 0 1 330 300 
           Z" fill="#FFFFFF" opacity="0.9" />

  <!-- Premium Chef Hat (incorporating cloud lines) -->
  <path d="M 210 250 
           C 200 170, 300 170, 290 250
           C 310 250, 310 275, 290 275
           L 210 275
           C 190 275, 190 250, 210 250 Z" fill="url(#goldGradient)" />

  <!-- Wings of Heaven (Left and Right) -->
  <!-- Left Wing -->
  <path d="M 170 230 
           C 120 200, 100 250, 140 280 
           C 100 270, 90 310, 150 310
           C 110 310, 110 340, 170 330
           C 160 300, 160 260, 170 230 Z" fill="url(#goldGradient)" opacity="0.9" />
  
  <!-- Right Wing -->
  <path d="M 330 230 
           C 380 200, 400 250, 360 280 
           C 400 270, 410 310, 350 310
           C 390 310, 390 340, 330 330
           C 340 300, 340 260, 330 230 Z" fill="url(#goldGradient)" opacity="0.9" />

  <!-- Stars (Heaven Theme) -->
  <polygon points="250,130 253,138 262,138 255,143 257,152 250,147 243,152 245,143 238,138 247,138" fill="url(#goldGradient)" />
  <polygon points="180,160 182,165 188,165 183,168 185,174 180,171 175,174 177,168 172,165 178,165" fill="url(#goldGradient)" opacity="0.8" />
  <polygon points="320,160 322,165 328,165 323,168 325,174 320,171 315,174 317,168 312,165 318,165" fill="url(#goldGradient)" opacity="0.8" />

  <!-- Typography: Vinay's Heaven -->
  <!-- Arc path for Text -->
  <path id="textArc" d="M 80 370 A 180 180 0 0 0 420 370" fill="none" />
  <text font-family="'Outfit', sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="3" text-anchor="middle">
    <textPath href="#textArc" startOffset="50%">VINAY'S HEAVEN</textPath>
  </text>

  <!-- Subtitle: Food Delivery -->
  <text x="250" y="420" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" fill="url(#goldGradient)" letter-spacing="5" text-anchor="middle" opacity="0.9">
    HEAVENLY TASTE DELIVERED
  </text>
</svg>
